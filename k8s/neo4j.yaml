apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: beu-cro-adv-daba-26
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:5
        ports:
          - containerPort: 7687
          - containerPort: 7474
        env:
          - name: NEO4J_AUTH
            value: neo4j/password
          - name: NEO4J_dbms_memory_heap_initial__size
            value: "2G"
          - name: NEO4J_dbms_memory_heap_max__size
            value: "2G"
          - name: NEO4J_dbms_memory_pagecache_size
            value: "4G"

---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-service
  namespace: beu-cro-adv-daba-26
spec:
  selector:
    app: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474