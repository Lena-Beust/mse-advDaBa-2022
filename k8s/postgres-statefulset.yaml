apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: beu-cro-adv-daba-26
spec:
  serviceName: postgres-service # Obligatoire pour le DNS stable des StatefulSets
  replicas: 1 # Pour de la HA (plusieurs répliques), la config est plus complexe
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16 # 📝 Version de Postgres
          ports:
            - containerPort: 5432 # Devrait être le même que dans la config map
          env:
            # Injection des secrets en tant que variables d'environnement
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: beu-cro-adv-daba-26-secrets # 📝 Nom du secret
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: beu-cro-adv-daba-26-secrets # 📝 Nom du secret
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: beu-cro-adv-daba-26-secrets # 📝 Nom du secret
                  key: postgres-db
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data  # Chemin des données PostgreSQL
              subPath: pgdata
          resources:
            requests:
              memory: "1Gi"    # Lower request to fit alongside Rancher
              cpu: "250m"      # Minimal CPU reservation
            limits:
              memory: "3Gi"    # Limite plus élevée, ajustez selon vos besoins
              cpu: "1000m"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
